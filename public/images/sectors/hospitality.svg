<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <g stroke="#a58e28" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Key shaft -->
    <line x1="100" y1="88" x2="100" y2="176"/>
    <!-- Key teeth -->
    <line x1="100" y1="176" x2="110" y2="176"/>
    <line x1="100" y1="168" x2="108" y2="168"/>
    <line x1="100" y1="160" x2="110" y2="160"/>
    <line x1="110" y1="176" x2="110" y2="172"/>
    <line x1="108" y1="168" x2="108" y2="164"/>
    <line x1="110" y1="160" x2="110" y2="156"/>
    <!-- Ornate bow (top) -->
    <ellipse cx="100" cy="62" rx="26" ry="30"/>
    <!-- Inner ornate shape -->
    <ellipse cx="100" cy="62" rx="16" ry="20"/>
    <!-- Decorative flourishes on bow -->
    <path d="M84 44 Q80 40 78 36" stroke-width="1" opacity="0.6"/>
    <path d="M116 44 Q120 40 122 36" stroke-width="1" opacity="0.6"/>
    <path d="M84 80 Q80 84 78 88" stroke-width="1" opacity="0.6"/>
    <path d="M116 80 Q120 84 122 88" stroke-width="1" opacity="0.6"/>
    <!-- Centre dot in bow -->
    <circle cx="100" cy="62" r="2" fill="#a58e28" stroke="none"/>
    <!-- Small accent at top -->
    <circle cx="100" cy="32" r="1.5" fill="#a58e28" stroke="none"/>
    <!-- Collar -->
    <rect x="94" y="86" width="12" height="6" rx="1"/>
  </g>
</svg>