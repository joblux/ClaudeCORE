<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <g stroke="#a58e28" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Outer arch -->
    <path d="M38 174 L38 72 Q38 36 100 36 Q162 36 162 72 L162 174"/>
    <!-- Inner arch -->
    <path d="M54 174 L54 78 Q54 50 100 50 Q146 50 146 78 L146 174"/>
    <!-- Keystone -->
    <path d="M96 36 L100 30 L104 36" stroke-width="1"/>
    <circle cx="100" cy="30" r="1.5" fill="#a58e28" stroke="none"/>
    <!-- Floor line -->
    <line x1="28" y1="174" x2="172" y2="174"/>
    <!-- Impost moulding left -->
    <line x1="50" y1="80" x2="58" y2="80" stroke-width="1"/>
    <!-- Impost moulding right -->
    <line x1="142" y1="80" x2="150" y2="80" stroke-width="1"/>
    <!-- Decorative panel left -->
    <rect x="42" y="110" width="8" height="50" rx="2" stroke-width="0.75" opacity="0.5"/>
    <!-- Decorative panel right -->
    <rect x="150" y="110" width="8" height="50" rx="2" stroke-width="0.75" opacity="0.5"/>
    <!-- Perspective lines through arch -->
    <line x1="54" y1="174" x2="80" y2="140" stroke-width="0.5" opacity="0.3"/>
    <line x1="146" y1="174" x2="120" y2="140" stroke-width="0.5" opacity="0.3"/>
    <line x1="80" y1="140" x2="120" y2="140" stroke-width="0.5" opacity="0.3"/>
    <!-- Distant arch hint -->
    <path d="M86 140 L86 120 Q86 108 100 108 Q114 108 114 120 L114 140" stroke-width="0.5" opacity="0.3"/>
  </g>
</svg>