    <line x1="100" y1="38" x2="100" y2="56"/>
    <!-- Spray lines -->
    <path d="M100 32 Q96 22 90 16" stroke-width="1" opacity="0.6"/>
    <path d="M100 32 Q100 20 100 14" stroke-width="1" opacity="0.6"/>
    <path d="M100 32 Q104 22 110 16" stroke-width="1" opacity="0.6"/>
    <!-- Spray dots -->
    <circle cx="88" cy="14" r="1" fill="#a58e28" stroke="none" opacity="0.5"/>
    <circle cx="100" cy="10" r="1" fill="#a58e28" stroke="none" opacity="0.5"/>
    <circle cx="112" cy="14" r="1" fill="#a58e28" stroke="none" opacity="0.5"/>
    <!-- Label line on bottle -->
    <line x1="76" y1="115" x2="124" y2="115" stroke-width="0.75" opacity="0.5"/>
    <line x1="82" y1="120" x2="118" y2="120" stroke-width="0.75" opacity="0.5"/>
    <!-- Base -->
    <line x1="64" y1="170" x2="136" y2="170"/>
  </g>
</svg>