<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <g stroke="#a58e28" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Bottle body -->
    <rect x="64" y="80" width="72" height="90" rx="4"/>
    <!-- Bottle neck -->
    <rect x="88" y="56" width="24" height="24" rx="1"/>
    <!-- Shoulder taper -->
    <line x1="64" y1="80" x2="88" y2="80"/>
    <line x1="112" y1="80" x2="136" y2="80"/>
    <path d="M88 80 L88 72 Q88 68 92 68 L108 68 Q112 68 112 72 L112 80"/>
    <!-- Cap -->
    <rect x="86" y="38" width="28" height="18" rx="3"/>
